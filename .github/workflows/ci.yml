name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/codex-autoresearch
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: plugins/codex-autoresearch/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build node
        run: npm run build:node

      - name: Build dashboard
        run: npm run build:dashboard

      - name: Run full check gate
        run: npm run check

      - name: Run MCP smoke test
        run: node scripts/autoresearch.mjs mcp-smoke

      - name: Run tests
        run: npm test
